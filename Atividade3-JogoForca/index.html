<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Jogo da Forca</h1>
        
        <div class="jogo">
            <div class="palavra-display" id="palavraDisplay">_ _ _ _ _</div>
            <div class="info-jogo">
                <p>Tentativas restantes: <span id="tentativas">6</span></p>
                <p>Letras chutadas: <span id="letrasChutadas">-</span></p>
            </div>
            <div class="input-letra">
                <input type="text" id="inputLetra" maxlength="1" placeholder="Digite uma letra" onkeypress="if(event.key === 'Enter') enviarLetra()">
                <button class="botao-enviar" onclick="enviarLetra()">Enviar</button>
            </div>
            
            <button class="botao-novo-jogo" onclick="iniciarJogo()">Novo Jogo</button>
            
            <div id="resultado" class="resultado"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
