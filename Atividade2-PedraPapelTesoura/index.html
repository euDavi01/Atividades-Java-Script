<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra Papel Tesoura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pedra Papel Tesoura</h1>
        <p class="instrucoes">Escolha uma opção para começar</p>
        
        <div class="botoes-opcoes">
            <button class="botao-opcao" onclick="jogar('pedra')">Pedra</button>
            <button class="botao-opcao" onclick="jogar('papel')">Papel</button>
            <button class="botao-opcao" onclick="jogar('tesoura')">Tesoura</button>
        </div>
        
        <div id="resultado" class="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
